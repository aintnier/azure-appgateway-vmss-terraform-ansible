# ============================================================================
# Destroy Pipeline - Terraform Plan -destroy -> Manual Approval -> Destroy
# ============================================================================

trigger: none
pr: none

variables:
  - name: serviceConnection
    value: "azure-oidc-connection"
  - name: workingDirectory
    value: "$(System.DefaultWorkingDirectory)/infra"
  - name: terraformVersion
    value: "1.14.8"
  - name: environmentName
    value: "dev"
  - group: terraform-vars

pool:
  name: "Default"

stages:
  # --- Stage 1: Destroy Plan ---
  - stage: DestroyPlan
    displayName: "Terraform Destroy Plan"
    jobs:
      - job: TerraformDestroyPlan
        displayName: "Generate Destroy Plan"
        steps:
          - task: TerraformInstaller@1
            displayName: "Install Terraform $(terraformVersion)"
            inputs:
              terraformVersion: "$(terraformVersion)"

          - task: AzureCLI@2
            displayName: "Terraform Init"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              addSpnToEnvironment: true
              scriptLocation: "inlineScript"
              inlineScript: |
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN=$idToken
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                terraform -chdir=$(workingDirectory) init

          - task: AzureCLI@2
            displayName: "Terraform Plan -destroy"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              addSpnToEnvironment: true
              scriptLocation: "inlineScript"
              inlineScript: |
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN=$idToken
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                terraform -chdir=$(workingDirectory) plan -destroy -out=tfplan-destroy

          - task: PublishPipelineArtifact@1
            displayName: "Publish Destroy Plan Artifact"
            inputs:
              targetPath: "$(workingDirectory)/tfplan-destroy"
              artifactName: "tfplan-destroy"

  # --- Stage 2: Destroy (with mandatory manual approval) ---
  - stage: Destroy
    displayName: "Terraform Destroy"
    dependsOn: DestroyPlan
    jobs:
      - deployment: TerraformDestroy
        displayName: "Destroy Infrastructure"
        environment: "$(environmentName)"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: "Install Terraform $(terraformVersion)"
                  inputs:
                    terraformVersion: "$(terraformVersion)"

                - task: DownloadPipelineArtifact@2
                  displayName: "Download Destroy Plan Artifact"
                  inputs:
                    artifactName: "tfplan-destroy"
                    targetPath: "$(workingDirectory)"

                - task: AzureCLI@2
                  displayName: "Terraform Init & Destroy"
                  inputs:
                    azureSubscription: "$(serviceConnection)"
                    scriptType: "bash"
                    addSpnToEnvironment: true
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN=$idToken
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_TENANT_ID=$tenantId
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      terraform -chdir=$(workingDirectory) init
                      terraform -chdir=$(workingDirectory) apply -auto-approve tfplan-destroy
