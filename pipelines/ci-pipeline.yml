# ============================================================================
# CI Pipeline - Terraform Format Check & Validate
# ============================================================================

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  - name: serviceConnection
    value: "azure-oidc-connection"
  - name: workingDirectory
    value: "$(System.DefaultWorkingDirectory)/infra"
  - name: terraformVersion
    value: "1.14.8"
  - group: terraform-vars

pool:
  vmImage: "ubuntu-latest"

stages:
  - stage: Validate
    displayName: "Terraform Validate"
    jobs:
      - job: FmtAndValidate
        displayName: "Format Check & Validate"
        steps:
          - task: TerraformInstaller@1
            displayName: "Install Terraform $(terraformVersion)"
            inputs:
              terraformVersion: "$(terraformVersion)"

          - task: AzureCLI@2
            displayName: "Terraform Init"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              addSpnToEnvironment: true
              scriptLocation: "inlineScript"
              inlineScript: |
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN=$idToken
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                terraform -chdir=$(workingDirectory) init -backend=false

          - script: terraform -chdir=$(workingDirectory) fmt -check -recursive
            displayName: "Terraform Format Check"

          - task: AzureCLI@2
            displayName: "Terraform Validate"
            inputs:
              azureSubscription: "$(serviceConnection)"
              scriptType: "bash"
              addSpnToEnvironment: true
              scriptLocation: "inlineScript"
              inlineScript: |
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN=$idToken
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                terraform -chdir=$(workingDirectory) validate
